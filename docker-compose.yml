services:
  postgres:
    image: postgres:15-alpine
    container_name: book-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-book_management}
      POSTGRES_USER: ${POSTGRES_USER:-bookuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - book-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookuser} -d ${POSTGRES_DB:-book_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: book-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - book-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./book-management-backend
      dockerfile: Dockerfile
    container_name: book-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-book_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bookuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bookpass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-256-bit-secret-before-production}
      WECHAT_MOCK_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:16666,http://localhost:5173,http://127.0.0.1:16666,http://127.0.0.1:5173}
    volumes:
      - upload_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - book-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  admin:
    build:
      context: ./book-management-admin
      dockerfile: Dockerfile
    container_name: book-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-16666}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - book-net

volumes:
  postgres_data:
  redis_data:
  upload_data:

networks:
  book-net:
    driver: bridge
