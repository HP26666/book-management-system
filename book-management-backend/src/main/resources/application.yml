server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: book-management-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/book_management}
    username: ${SPRING_DATASOURCE_USERNAME:bookuser}
    password: ${SPRING_DATASOURCE_PASSWORD:bookpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:change-me-to-a-256-bit-secret-before-production}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:7200000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

bookms:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173}
  file:
    upload-dir: ${BOOKMS_UPLOAD_DIR:/app/uploads}
    max-size-bytes: ${BOOKMS_FILE_MAX_SIZE_BYTES:5242880}
    allowed-extensions: ${BOOKMS_FILE_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif}
  borrow:
    daily-fine-rate: ${BOOKMS_BORROW_DAILY_FINE_RATE:0.5}
    max-fine-price-ratio: ${BOOKMS_BORROW_MAX_FINE_PRICE_RATIO:0.5}
    renew-days: ${BOOKMS_BORROW_RENEW_DAYS:15}
    renew-max-count: ${BOOKMS_BORROW_RENEW_MAX_COUNT:1}
    reservation-expire-days: ${BOOKMS_RESERVATION_EXPIRE_DAYS:7}
    notify-expire-days: ${BOOKMS_NOTIFY_EXPIRE_DAYS:3}
    reader-card-valid-years: ${BOOKMS_READER_CARD_VALID_YEARS:3}
    mock-wechat-username-prefix: ${BOOKMS_MOCK_WECHAT_USERNAME_PREFIX:wx_mock_}
