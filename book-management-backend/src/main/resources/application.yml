server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: book-management-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/book_management}
    username: ${SPRING_DATASOURCE_USERNAME:bookuser}
    password: ${SPRING_DATASOURCE_PASSWORD:bookpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  server:
    port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-to-a-256-bit-secret-before-production}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:7200000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

bookms:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:16666,http://localhost:5173,http://127.0.0.1:16666,http://127.0.0.1:5173}
  upload:
    path: ${UPLOAD_PATH:./uploads}
    allowed-types: image/jpeg,image/png,image/gif,image/webp
    max-size: 5242880
  wechat:
    mock-enabled: ${WECHAT_MOCK_ENABLED:true}
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
  borrow:
    default-days: 30
    renew-days: 15
    max-renew-count: 1
    daily-fine-rate: 0.5
    max-fine: 50.0
  reservation:
    expire-days: 3
